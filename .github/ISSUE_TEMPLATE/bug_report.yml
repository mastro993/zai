name: Bug Report
description: Report incorrect or broken behavior
title: "[Bug]: "
labels: ["needs-triage", "bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Include enough detail for someone to reproduce it locally.

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      description: Where does this happen?
      options:
        - Desktop (Tauri)
        - Web (Axum server)
        - Both
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version or commit
      description: App version, git commit, or "main" if unsure.
      placeholder: e.g. 0.1.0 or abc1234
    validations:
      required: false

  - type: textarea
    id: repro-steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps from a clean start. Include commands when relevant.
      placeholder: |
        1. Open ...
        2. Click ...
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Use synthetic or fully redacted data only. Never attach real databases, statements, exports, credentials, tokens, or unredacted financial logs.
    validations:
      required: false

  - type: checkboxes
    id: privacy-acknowledgement
    attributes:
      label: Privacy acknowledgement
      description: Required before submitting.
      options:
        - label: I confirm that examples, logs, screenshots, and attachments use synthetic or fully redacted data only (no real financial data, credentials, or secrets).
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
    validations:
      required: false
