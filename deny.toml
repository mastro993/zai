# Rust advisory scanning via cargo-deny (RustSec advisory database).
# Exceptions use expires= and owner= in the comment above each ignore entry.

[advisories]
db-urls = ["https://github.com/RustSec/advisory-db"]
unmaintained = "none"
unsound = "all"
unused-ignored-advisory = "warn"
ignore = [
  # expires=2026-10-15 owner=zai-security
  { id = "RUSTSEC-2026-0007", reason = "Transitive bytes crate; upgrade in separately reviewed dependency change" },
